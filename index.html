<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game O'Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --border: #2e2b38;
    --accent: #c8f064;
    --accent2: #7c6af5;
    --text: #f0ecff;
    --muted: #7a7589;
    --danger: #ff6b6b;
    --gold: #f5c842;
    --green: #5debb0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124,106,245,0.15) 0%, transparent 70%);
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .masthead {
    text-align: center;
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    position: relative;
  }

  .phase-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 1rem;
    font-family: 'Syne', sans-serif;
  }

  .phase-tag.submission { background: rgba(245,200,66,0.12); color: var(--gold); border: 1px solid rgba(245,200,66,0.4); }
  .phase-tag.voting { background: rgba(200,240,100,0.1); color: var(--accent); border: 1px solid rgba(200,240,100,0.4); }
  .phase-tag.closed { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }

  .phase-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 2.75rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .countdown {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
  }

  .countdown strong { color: var(--accent); font-weight: 600; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    margin-bottom: 1.25rem;
  }

  .card-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.02);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .card-body { padding: 1.5rem; }

  /* ── Input ── */
  .input-row {
    display: flex;
    gap: 0.75rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: rgba(255,255,255,0.04);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0f0e11;
    font-family: 'Syne', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .btn-primary:hover:not(:disabled) {
    background: #d9ff7a;
    transform: translateY(-1px);
  }

  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .remaining-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  .remaining-badge span {
    font-weight: 700;
    color: var(--accent);
  }

  /* ── Options list ── */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    transition: border-color 0.2s, background 0.2s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .option-item.has-votes {
    border-color: rgba(200,240,100,0.3);
    background: rgba(200,240,100,0.04);
  }

  .option-number {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 20px;
  }

  .option-name {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--text);
  }

  .vote-counter {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .vcbtn {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    line-height: 1;
    user-select: none;
  }

  .vcbtn:hover:not(:disabled) { border-color: var(--accent); background: rgba(200,240,100,0.12); color: var(--accent); transform: scale(1.08); }
  .vcbtn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

  .vcount {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    min-width: 22px;
    text-align: center;
    color: var(--accent);
    transition: transform 0.15s;
  }

  .vcount.zero { color: var(--muted); }

  /* ── Vote pips ── */
  .pips-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .pips-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; font-family: 'Syne', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }

  .pips {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .pip {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .pip.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(200,240,100,0.4);
    transform: scale(1.1);
  }

  .pips-count { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--accent); white-space: nowrap; }

  /* ── Submit btn ── */
  .submit-wrap { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); }

  .btn-submit {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #0f0e11;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-submit:hover:not(:disabled) {
    background: #d9ff7a;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(200,240,100,0.3);
  }

  .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    border-radius: 100px;
    font-size: 0.875rem;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #2d1a1a; border-color: var(--danger); color: var(--danger); }
  .toast.success { background: #162d22; border-color: var(--green); color: var(--green); }

  /* ── Admin ── */
  .admin-bar {
    text-align: center;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px dashed var(--border);
  }

  .admin-toggle {
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'DM Sans', sans-serif;
  }

  .admin-panel {
    display: none;
    margin-top: 1rem;
  }

  .admin-panel.visible { display: block; }

  .admin-input-row {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
  }

  .admin-input-row input {
    max-width: 160px;
    text-align: center;
    letter-spacing: 0.1em;
  }

  /* ── Results ── */
  .results-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    animation: slideIn 0.3s ease both;
  }

  .result-item.winner {
    border-color: rgba(245,200,66,0.4);
    background: rgba(245,200,66,0.06);
  }

  .result-rank {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 24px;
  }

  .result-rank.first { color: var(--gold); }

  .result-name { flex: 1; font-size: 0.95rem; font-weight: 400; color: var(--text); }

  .result-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .result-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }
  .result-item.winner .result-bar { background: var(--gold); }

  .result-votes {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--accent);
    min-width: 55px;
    text-align: right;
  }

  .result-item.winner .result-votes { color: var(--gold); }

  /* ── Success ── */
  .success-state {
    text-align: center;
    padding: 2.5rem 1.5rem;
  }

  .success-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(93,235,176,0.1);
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin: 0 auto 1rem;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .success-state h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 0.4rem;
  }

  .success-state p { color: var(--muted); font-size: 0.9rem; }

  /* Closed phase */
  .closed-msg {
    text-align: center;
    padding: 3rem 2rem;
  }

  .closed-msg .big {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .closed-msg h2 { font-family: 'Syne', sans-serif; font-weight: 800; }
  .closed-msg p { color: var(--muted); font-size: 0.9rem; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0f0e11;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Mystery Card Reward ── */
  .reward-section {
    text-align: center;
    padding: 2rem 1.5rem 2.5rem;
  }

  .reward-section h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: var(--text);
  }

  .reward-section .reward-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.75rem;
  }

  .mystery-card-scene {
    perspective: 600px;
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .mystery-card {
    width: 140px;
    height: 196px;
    position: relative;
    transform-style: preserve-3d;
    animation: cardCornerSpin 4s linear infinite;
  }

  .mystery-card-face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    border: 2px solid rgba(124,106,245,0.5);
    overflow: hidden;
  }

  .mystery-card-front {
    background: linear-gradient(145deg, #1e1b2e 0%, #2a2540 50%, #1e1b2e 100%);
    box-shadow:
      0 8px 32px rgba(124,106,245,0.3),
      0 0 60px rgba(124,106,245,0.1),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .mystery-card-front::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(124,106,245,0.15) 45%,
      rgba(200,240,100,0.12) 50%,
      rgba(245,200,66,0.1) 55%,
      transparent 70%
    );
    background-size: 200% 200%;
    animation: shimmer 2s ease-in-out infinite;
  }

  .mystery-card-front::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(124,106,245,0.25);
    border-radius: 8px;
    pointer-events: none;
  }

  .mystery-card-back {
    background: linear-gradient(145deg, #252040 0%, #1a1630 50%, #252040 100%);
    transform: rotateY(180deg);
    box-shadow:
      0 8px 32px rgba(124,106,245,0.3),
      0 0 60px rgba(124,106,245,0.1);
  }

  .mystery-card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(124,106,245,0.06) 8px,
      rgba(124,106,245,0.06) 16px
    );
  }

  .mystery-card-back::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(124,106,245,0.2);
    border-radius: 8px;
  }

  .mystery-qmark {
    font-family: 'Syne', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    background: linear-gradient(180deg, var(--accent2) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 12px rgba(124,106,245,0.5));
    animation: qPulse 2s ease-in-out infinite;
  }

  .mystery-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(124,106,245,0.7);
    margin-top: 0.25rem;
    position: relative;
    z-index: 1;
  }

  .mystery-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .mystery-stars .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--accent2);
    border-radius: 50%;
    opacity: 0;
    animation: starTwinkle 2s ease-in-out infinite;
  }

  .mystery-stars .star:nth-child(1) { top: 18%; left: 22%; animation-delay: 0s; }
  .mystery-stars .star:nth-child(2) { top: 30%; right: 20%; animation-delay: 0.5s; }
  .mystery-stars .star:nth-child(3) { bottom: 28%; left: 18%; animation-delay: 1s; }
  .mystery-stars .star:nth-child(4) { bottom: 18%; right: 24%; animation-delay: 1.4s; }
  .mystery-stars .star:nth-child(5) { top: 50%; left: 12%; animation-delay: 0.7s; }

  @keyframes cardCornerSpin {
    from { transform: rotate(45deg) rotateY(0deg); }
    to { transform: rotate(45deg) rotateY(360deg); }
  }

  @keyframes shimmer {
    0%, 100% { background-position: -100% -100%; }
    50% { background-position: 200% 200%; }
  }

  @keyframes qPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes starTwinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  .reward-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: var(--accent2);
    background: rgba(124,106,245,0.08);
    border: 1px solid rgba(124,106,245,0.25);
    padding: 6px 14px;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 1.25rem;
  }

  .tab-btn {
    flex: 1;
    padding: 0.65rem 1rem;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }

  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    border: 1px solid var(--border);
  }

  .tab-btn.active .tab-dot {
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(124,106,245,0.5);
  }

  .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.2s;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>
<div class="container">

  <!-- Masthead -->
  <div class="masthead">
    <div class="phase-tag" id="phase-tag">
      <div class="phase-dot"></div>
      <span id="phase-label">Loading...</span>
    </div>
    <h1>Game O'Clock</h1>
    <p class="subtitle">Suggest 2 games, cast 5 votes, top 12 will be played</p>
    <div class="countdown" id="countdown-wrap">
      ⏱ <strong id="countdown-text">—</strong>
    </div>
  </div>

  <!-- Main content -->
  <div id="main-content"></div>

  <!-- Admin bar -->
  <div class="admin-bar">
    <button class="admin-toggle" onclick="toggleAdminPanel()">admin</button>
    <div class="admin-panel" id="admin-panel">
      <div class="admin-input-row">
        <input type="password" id="admin-pw" placeholder="password" />
        <button class="btn-primary" onclick="adminLogin()">Enter</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIGURATION — edit these values
// ═══════════════════════════════════════════════════
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyZCmVYzO9QYSVYkaZ1Jglhgs0cHb3YG42W4bfnrdEAaIu16YwVTkjCG-vJAAHyf9Zf/exec"; // paste your Apps Script web app URL
const ADMIN_PASSWORD = "abc123";
const TOTAL_VOTES = 5;
const MAX_OPTIONS_PER_USER = 2;
const TIMEZONE = "America/New_York"; // Eastern

// Phase times (today, Eastern)
// Submission phase: midnight → 11:59 PM  (all day)
// Voting phase: starts at 6:00 PM ET, ends at 11:59 PM ET
// After midnight: closed
const VOTING_START_HOUR = 20; // 6 PM ET — change this if you want voting to start earlier/later
// ═══════════════════════════════════════════════════

// ── State ──
let phase = "submission"; // "submission" | "voting" | "closed"
let options = [];
let userVotes = {};
let userOptionCount = 0;
let votesAllocated = {};
let hasVoted = false;
let hasSubmittedOptions = false;
let isAdmin = false;
let resultsRevealed = false;

// ── Persistence (localStorage for per-user limits) ──
const STORAGE_KEY = "voteboard_" + new Date().toLocaleDateString("en-CA", {timeZone: TIMEZONE});

function loadUserState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      userOptionCount = s.optionCount || 0;
      hasVoted = s.hasVoted || false;
    }
  } catch(e) {}
}

function saveUserState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      optionCount: userOptionCount,
      hasVoted: hasVoted
    }));
  } catch(e) {}
}

// ── Phase detection ──
function detectPhase() {
  const now = new Date();
  const etNow = new Date(now.toLocaleString("en-US", { timeZone: TIMEZONE }));
  const h = etNow.getHours();
  const m = etNow.getMinutes();
  const totalMins = h * 60 + m;
  const votingStartMins = VOTING_START_HOUR * 60;
  const endMins = 23 * 60 + 59;

  if (totalMins < votingStartMins) return "submission";
  if (totalMins <= endMins) return "voting";
  return "closed";
}

function getPhaseEndTime() {
  const now = new Date();
  const etNow = new Date(now.toLocaleString("en-US", { timeZone: TIMEZONE }));
  const result = new Date(etNow);
  if (phase === "submission") {
    result.setHours(VOTING_START_HOUR, 0, 0, 0);
  } else {
    result.setHours(23, 59, 59, 0);
  }
  // Convert back to UTC-based Date for diff calculation
  const diff = result - etNow;
  return diff;
}

function formatCountdown(ms) {
  if (ms <= 0) return "ending soon";
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}m remaining`;
  if (m > 0) return `${m}m ${sec}s remaining`;
  return `${sec}s remaining`;
}

// ── API calls ──
// Google Apps Script CORS workaround:
//   - Reads: JSONP via dynamic <script> tag (bypasses CORS entirely)
//   - Writes: POST no-cors with no Content-Type header (avoids preflight), assume success
async function apiCall(action, payload = {}) {
  if (!SHEET_URL || SHEET_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    return { success: true, demo: true };
  }

  const isRead = action === "getOptions" || action === "getResults";

  try {
    if (isRead) {
      const url = new URL(SHEET_URL);
      url.searchParams.set("action", action);
      Object.entries(payload).forEach(([k, v]) =>
        url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : v)
      );
      return await fetchViaJSONP(url.toString());
    } else {
      // Fire-and-forget POST — no-cors, no Content-Type = no preflight
      await fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action, ...payload })
      });
      return { success: true };
    }
  } catch(e) {
    return { success: false, error: e.message };
  }
}

// JSONP: injects a <script> tag so the request bypasses CORS entirely
function fetchViaJSONP(url) {
  return new Promise((resolve) => {
    const cbName = "_jsonp_" + Date.now();
    const scriptId = "jsonp_script_" + cbName;

    window[cbName] = (data) => {
      delete window[cbName];
      document.getElementById(scriptId)?.remove();
      resolve(data);
    };

    const script = document.createElement("script");
    script.id = scriptId;
    script.src = url + "&callback=" + cbName;
    script.onerror = () => {
      delete window[cbName];
      script.remove();
      resolve({ success: true, options: [], results: [] });
    };
    document.head.appendChild(script);

    // 8s timeout fallback
    setTimeout(() => {
      if (window[cbName]) {
        delete window[cbName];
        document.getElementById(scriptId)?.remove();
        resolve({ success: true, options: [], results: [] });
      }
    }, 8000);
  });
}

async function fetchOptions() {
  const res = await apiCall("getOptions");
  if (res.demo) return; // demo mode, options stay local
  if (res.success && res.options) {
    options = res.options;
  }
}

async function fetchResults() {
  const res = await apiCall("getResults");
  if (res.demo) {
    // In demo mode, show mock results
    return options.map((o, i) => ({ name: o, votes: Math.floor(Math.random() * 10) }));
  }
  if (res.success && res.results) return res.results;
  return [];
}

// ── Toast ──
let toastTimer;
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = "toast"; }, 3000);
}

// ── Render ──
function renderPhaseTag() {
  const tag = document.getElementById("phase-tag");
  const label = document.getElementById("phase-label");
  tag.className = "phase-tag";
  if (phase === "submission") {
    tag.classList.add("submission");
    label.textContent = "Submissions Open";
  } else if (phase === "voting") {
    tag.classList.add("voting");
    label.textContent = "Voting Open";
  } else {
    tag.classList.add("closed");
    document.querySelector(".phase-dot").style.animation = "none";
    label.textContent = "Closed";
  }
}

function render() {
  phase = detectPhase();
  renderPhaseTag();

  const content = document.getElementById("main-content");

  if (phase === "submission") {
    renderSubmissionPhase(content);
  } else if (phase === "voting") {
    renderVotingPhase(content);
  } else {
    renderClosedPhase(content);
  }

  updateCountdown();
}

function renderSubmissionPhase(content) {
  const remaining = MAX_OPTIONS_PER_USER - userOptionCount;
  content.innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">Suggest an Option</span>
        <span style="font-size:0.8rem;color:var(--muted)">${remaining} suggestion${remaining !== 1 ? 's' : ''} left</span>
      </div>
      <div class="card-body">
        <div class="input-row">
          <input type="text" id="option-input" placeholder="Type your suggestion…" maxlength="80"
            ${remaining === 0 ? 'disabled' : ''}
            onkeydown="if(event.key==='Enter') addOption()" />
          <button class="btn-primary" onclick="addOption()" ${remaining === 0 ? 'disabled' : ''}>Add</button>
        </div>
        ${remaining === 0 ? '<p style="font-size:0.8rem;color:var(--muted);margin-top:0.75rem">You\'ve used all your suggestions for today.</p>' : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">All Suggestions</span>
        <span style="font-size:0.8rem;color:var(--muted)">${options.length} so far</span>
      </div>
      <div class="card-body">
        <div class="options-list" id="options-list">
          ${options.length === 0
            ? '<div class="empty">No suggestions yet — be the first!</div>'
            : options.map((o, i) => `
              <div class="option-item">
                <span class="option-number">${i + 1}</span>
                <span class="option-name">${escHtml(o)}</span>
              </div>`).join('')}
        </div>
      </div>
    </div>

    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:0.5rem">
      Voting opens at ${VOTING_START_HOUR > 12 ? VOTING_START_HOUR - 12 : VOTING_START_HOUR}:00 ${VOTING_START_HOUR >= 12 ? 'PM' : 'AM'} ET
    </p>
  `;
}

function renderVotingPhase(content) {
  if (hasVoted) {
    content.innerHTML = `
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('results')"><span class="tab-dot"></span> Status</button>
        <button class="tab-btn" onclick="switchTab('reward')"><span class="tab-dot"></span> Reward</button>
      </div>

      <div id="tab-results" class="tab-panel active">
        <div class="card">
          <div class="success-state">
            <div class="success-icon">✓</div>
            <h2>Votes Submitted!</h2>
            <p>Results will be revealed by the organizer.</p>
          </div>
        </div>
      </div>
      <div id="tab-reward" class="tab-panel"></div>
    `;
    renderRewardCard(document.getElementById('tab-reward'));
    return;
  }

  const used = Object.values(votesAllocated).reduce((a, b) => a + b, 0);
  const remaining = TOTAL_VOTES - used;

  content.innerHTML = `
    <div class="card">
      <div class="pips-row">
        <span class="pips-label">Votes placed</span>
        <div class="pips">
          ${Array.from({length: TOTAL_VOTES}, (_, i) => `<div class="pip ${i < used ? 'filled' : ''}"></div>`).join('')}
        </div>
        <span class="pips-count">${used} / ${TOTAL_VOTES}</span>
      </div>

      <div class="card-body">
        <div class="options-list" id="vote-options">
          ${options.length === 0
            ? '<div class="empty">No options were submitted.</div>'
            : options.map((o, i) => {
                const v = votesAllocated[i] || 0;
                return `
                  <div class="option-item ${v > 0 ? 'has-votes' : ''}" id="vrow-${i}">
                    <span class="option-number">${i + 1}</span>
                    <span class="option-name">${escHtml(o)}</span>
                    <div class="vote-counter">
                      <button class="vcbtn" id="sub-${i}" onclick="changeVote(${i}, -1)" ${v === 0 ? 'disabled' : ''}>−</button>
                      <span class="vcount ${v === 0 ? 'zero' : ''}" id="vc-${i}">${v}</span>
                      <button class="vcbtn" id="add-${i}" onclick="changeVote(${i}, 1)" ${remaining === 0 ? 'disabled' : ''}>+</button>
                    </div>
                  </div>`;
              }).join('')}
        </div>
      </div>

      <div class="submit-wrap">
        <button class="btn-submit" id="submit-votes-btn" onclick="submitVotes()" ${used !== TOTAL_VOTES ? 'disabled' : ''}>
          ${used === TOTAL_VOTES ? 'Submit My Votes' : `Place ${remaining} more vote${remaining !== 1 ? 's' : ''} to submit`}
        </button>
      </div>
    </div>
  `;
}

function renderClosedPhase(content) {
  content.innerHTML = `
    <div class="card">
      <div class="closed-msg">
        <div class="big">🏆</div>
        <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:900;margin-bottom:0.5rem">Voting Has Ended</h2>
        <p>Here are tonight's results!</p>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('results')"><span class="tab-dot"></span> Results</button>
      <button class="tab-btn" onclick="switchTab('reward')"><span class="tab-dot"></span> Reward</button>
    </div>

    <div id="tab-results" class="tab-panel active"></div>
    <div id="tab-reward" class="tab-panel"></div>
  `;

  renderResults(document.getElementById('tab-results'));
  renderRewardCard(document.getElementById('tab-reward'));
}

async function renderResults(container, append = false) {
  const results = await fetchResults();
  if (!results || results.length === 0) return;

  results.sort((a, b) => b.votes - a.votes);
  const maxVotes = results[0]?.votes || 1;

  const html = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">Results</span>
        <span style="font-size:0.8rem;color:var(--muted)">${results.reduce((a,b)=>a+b.votes,0)} total votes</span>
      </div>
      <div class="card-body">
        <div class="results-list">
          ${results.map((r, i) => `
            <div class="result-item ${i === 0 ? 'winner' : ''}" style="animation-delay:${i * 0.07}s">
              <span class="result-rank ${i === 0 ? 'first' : ''}">${i === 0 ? '🥇' : '#' + (i+1)}</span>
              <span class="result-name">${escHtml(r.name)}</span>
              <div class="result-bar-wrap"><div class="result-bar" style="width:${Math.round((r.votes / maxVotes) * 100)}%"></div></div>
              <span class="result-votes">${r.votes} vote${r.votes !== 1 ? 's' : ''}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;

  if (append) {
    container.insertAdjacentHTML('beforeend', html);
  } else {
    container.innerHTML = html;
  }
}

// ── Tabs ──
function switchTab(tabId) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const panel = document.getElementById('tab-' + tabId);
  if (panel) panel.classList.add('active');

  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(b => {
    if (b.textContent.trim().toLowerCase().includes(tabId)) b.classList.add('active');
  });
}

// ── Reward Card ──
function renderRewardCard(container) {
  const html = `
    <div class="card">
      <div class="reward-section">
        <h3>Mystery Reward</h3>
        <p class="reward-subtitle">All players who finish the winning games unlock this prize</p>
        <div class="mystery-card-scene">
          <div class="mystery-card">
            <div class="mystery-card-face mystery-card-front">
              <div class="mystery-stars">
                <span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span>
              </div>
              <span class="mystery-qmark">?</span>
              <span class="mystery-label">Mystery</span>
            </div>
            <div class="mystery-card-face mystery-card-back">
              <div class="mystery-stars">
                <span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span><span class="star"></span>
              </div>
              <span class="mystery-qmark">?</span>
              <span class="mystery-label">Reward</span>
            </div>
          </div>
        </div>
        <span class="reward-cta">✨ Play to find out</span>
      </div>
    </div>
  `;
  container.insertAdjacentHTML('beforeend', html);
}

// ── Actions ──
async function addOption() {
  const input = document.getElementById("option-input");
  if (!input) return;
  const val = input.value.trim();
  if (!val) { showToast("Please enter a suggestion", "error"); return; }
  if (userOptionCount >= MAX_OPTIONS_PER_USER) { showToast("You've used all your suggestions", "error"); return; }

  input.disabled = true;
  const btn = input.nextElementSibling;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const res = await apiCall("addOption", { option: val });

  if (res.success || res.demo) {
    options.push(val);
    userOptionCount++;
    saveUserState();
    input.value = "";
    showToast("Suggestion added!", "success");
    render();
  } else {
    showToast("Couldn't save — try again", "error");
    input.disabled = false;
    btn.disabled = false;
    btn.textContent = "Add";
  }
}

function changeVote(index, delta) {
  const current = votesAllocated[index] || 0;
  const used = Object.values(votesAllocated).reduce((a, b) => a + b, 0);
  const newVal = current + delta;
  const newUsed = used + delta;

  if (newVal < 0 || newUsed > TOTAL_VOTES || newUsed < 0) return;
  votesAllocated[index] = newVal;

  // Update just the relevant elements without full re-render
  const vc = document.getElementById(`vc-${index}`);
  const row = document.getElementById(`vrow-${index}`);
  const subBtn = document.getElementById(`sub-${index}`);

  if (vc) {
    vc.textContent = newVal;
    vc.className = "vcount" + (newVal === 0 ? " zero" : "");
  }
  if (row) row.className = "option-item" + (newVal > 0 ? " has-votes" : "");
  if (subBtn) subBtn.disabled = newVal === 0;

  // Update all add buttons
  const newRemaining = TOTAL_VOTES - (Object.values(votesAllocated).reduce((a, b) => a + b, 0));
  options.forEach((_, i) => {
    const addBtn = document.getElementById(`add-${i}`);
    if (addBtn) addBtn.disabled = newRemaining === 0;
  });

  // Update pips
  const totalUsed = Object.values(votesAllocated).reduce((a, b) => a + b, 0);
  document.querySelectorAll(".pip").forEach((p, i) => {
    p.classList.toggle("filled", i < totalUsed);
  });

  // Update submit button
  const submitBtn = document.getElementById("submit-votes-btn");
  if (submitBtn) {
    submitBtn.disabled = totalUsed !== TOTAL_VOTES;
    submitBtn.textContent = totalUsed === TOTAL_VOTES
      ? "Submit My Votes"
      : `Place ${TOTAL_VOTES - totalUsed} more vote${TOTAL_VOTES - totalUsed !== 1 ? 's' : ''} to submit`;
  }

  const pipsCount = document.querySelector(".pips-count");
  if (pipsCount) pipsCount.textContent = `${totalUsed} / ${TOTAL_VOTES}`;
}

async function submitVotes() {
  const used = Object.values(votesAllocated).reduce((a, b) => a + b, 0);
  if (used !== TOTAL_VOTES) return;

  const btn = document.getElementById("submit-votes-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';

  const voteData = options.map((name, i) => ({ name, votes: votesAllocated[i] || 0 }));
  const res = await apiCall("submitVotes", { votes: voteData });

  if (res.success || res.demo) {
    hasVoted = true;
    saveUserState();
    showToast("Votes submitted!", "success");
    render();
  } else {
    showToast("Couldn't submit — try again", "error");
    btn.disabled = false;
    btn.textContent = "Submit My Votes";
  }
}

// ── Admin ──
function toggleAdminPanel() {
  document.getElementById("admin-panel").classList.toggle("visible");
}

function adminLogin() {
  const pw = document.getElementById("admin-pw").value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("admin-panel").innerHTML = `
      <p style="font-size:0.8rem;color:var(--green);font-weight:700;margin-bottom:0.75rem">✓ Admin mode active</p>
      <button class="btn-primary" onclick="revealResults()" style="background:var(--gold);color:#0f0e11;border:none;font-family:'Syne',sans-serif;font-weight:700">Reveal Results</button>
    `;
    showToast("Admin access granted", "success");
  } else {
    showToast("Wrong password", "error");
    document.getElementById("admin-pw").value = "";
  }
}

async function revealResults() {
  resultsRevealed = true;
  showToast("Loading results…");
  const content = document.getElementById("main-content");
  await renderResults(content, true);
  showToast("Results revealed!", "success");
}

// ── Countdown ──
function updateCountdown() {
  if (phase === "closed") {
    document.getElementById("countdown-wrap").style.display = "none";
    return;
  }
  const ms = getPhaseEndTime();
  document.getElementById("countdown-text").textContent = formatCountdown(ms);
}

// ── Utils ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
loadUserState();

// Demo: preload some fake options if no backend
if (!SHEET_URL || SHEET_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
  options = ["Option A", "Option B", "Option C"];
}

fetchOptions().then(() => render());

// Update countdown every second, re-check phase every minute
setInterval(updateCountdown, 1000);
setInterval(() => {
  const newPhase = detectPhase();
  if (newPhase !== phase) {
    phase = newPhase;
    render();
  }
}, 10000);
</script>

</html>
