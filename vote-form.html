<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote Allocator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --border: #2e2b38;
    --accent: #c8f064;
    --accent2: #7c6af5;
    --text: #f0ecff;
    --muted: #7a7589;
    --danger: #ff6b6b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124,106,245,0.15) 0%, transparent 70%);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 540px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }

  .header {
    padding: 2.5rem 2.5rem 2rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(124,106,245,0.08), transparent);
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .votes-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(200,240,100,0.04);
  }

  .votes-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .vote-pips {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .pip {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .pip.used {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(200,240,100,0.4);
    transform: scale(1.1);
  }

  .remaining-count {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 80px;
    text-align: right;
  }

  .options-list {
    padding: 1.5rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    transition: border-color 0.2s, background 0.2s;
  }

  .option-row:has(.count:not([data-count="0"])) {
    border-color: rgba(200,240,100,0.3);
    background: rgba(200,240,100,0.04);
  }

  .option-name {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.3;
  }

  .counter {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
    line-height: 1;
  }

  .btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    transform: scale(1.05);
  }

  .btn.add:hover:not(:disabled) {
    background: rgba(200,240,100,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    transform: none;
  }

  .count {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    width: 24px;
    text-align: center;
    color: var(--accent);
    transition: transform 0.15s;
  }

  .count[data-count="0"] {
    color: var(--muted);
  }

  .footer {
    padding: 1.5rem 2.5rem 2rem;
    border-top: 1px solid var(--border);
  }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #0f0e11;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .submit-btn:hover:not(:disabled) {
    background: #d9ff7a;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(200,240,100,0.3);
  }

  .submit-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .hint {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  /* Success state */
  .success-screen {
    display: none;
    padding: 3rem 2.5rem;
    text-align: center;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .success-screen.visible {
    display: flex;
  }

  .success-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(200,240,100,0.15);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .success-screen h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
  }

  .success-screen p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .results-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .result-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1rem;
    background: rgba(200,240,100,0.06);
    border: 1px solid rgba(200,240,100,0.15);
    border-radius: 8px;
    font-size: 0.9rem;
  }

  .result-item .result-name { color: var(--text); }
  .result-item .result-votes {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--accent);
  }

  .reset-btn {
    margin-top: 1rem;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  /* Pulse animation on count change */
  @keyframes countPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .count.pop {
    animation: countPop 0.2s ease;
  }
</style>
</head>
<body>

<div class="card">
  <div id="form-section">
    <div class="header">
      <h1>Cast Your Votes</h1>
      <p>You have <strong>5 votes</strong> to distribute however you like. Stack them all on one choice or spread them out.</p>
    </div>

    <div class="votes-bar">
      <span class="votes-label">Votes used</span>
      <div class="vote-pips" id="pips">
        <div class="pip" id="pip-0"></div>
        <div class="pip" id="pip-1"></div>
        <div class="pip" id="pip-2"></div>
        <div class="pip" id="pip-3"></div>
        <div class="pip" id="pip-4"></div>
      </div>
      <span class="remaining-count" id="remaining-text">0 / 5</span>
    </div>

    <div class="options-list" id="options-container">
      <!-- Options rendered by JS -->
    </div>

    <div class="footer">
      <button class="submit-btn" id="submit-btn" disabled onclick="handleSubmit()">
        Submit Votes
      </button>
      <p class="hint" id="hint-text">Allocate all 5 votes to submit</p>
    </div>
  </div>

  <div class="success-screen" id="success-section">
    <div class="success-icon">✓</div>
    <h2>Votes Submitted!</h2>
    <p>Here's how you allocated your 5 votes:</p>
    <div class="results-list" id="results-list"></div>
    <button class="reset-btn" onclick="resetForm()">Submit another response</button>
  </div>
</div>

<script>
  // ── EDIT YOUR OPTIONS HERE ──────────────────────────────────
  const FORM_TITLE = "Cast Your Votes";
  const TOTAL_VOTES = 5;
  const options = [
    "Option A",
    "Option B",
    "Option C",
    "Option D",
    "Option E",
  ];
  // ────────────────────────────────────────────────────────────

  let votes = new Array(options.length).fill(0);

  function totalUsed() {
    return votes.reduce((a, b) => a + b, 0);
  }

  function render() {
    const used = totalUsed();
    const remaining = TOTAL_VOTES - used;

    // Pips
    for (let i = 0; i < TOTAL_VOTES; i++) {
      const pip = document.getElementById(`pip-${i}`);
      pip.classList.toggle('used', i < used);
    }

    document.getElementById('remaining-text').textContent = `${used} / ${TOTAL_VOTES}`;

    // Submit button
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = used !== TOTAL_VOTES;
    document.getElementById('hint-text').textContent =
      used === TOTAL_VOTES
        ? "All votes placed — ready to submit!"
        : `${remaining} vote${remaining !== 1 ? 's' : ''} remaining`;

    // Update each option row
    options.forEach((_, i) => {
      const countEl = document.getElementById(`count-${i}`);
      const addBtn = document.getElementById(`add-${i}`);
      const subBtn = document.getElementById(`sub-${i}`);

      countEl.dataset.count = votes[i];
      countEl.textContent = votes[i];
      addBtn.disabled = remaining === 0;
      subBtn.disabled = votes[i] === 0;
    });
  }

  function changeVote(index, delta) {
    const newVal = votes[index] + delta;
    const newTotal = totalUsed() + delta;
    if (newVal < 0 || newTotal > TOTAL_VOTES) return;
    votes[index] = newVal;

    // Animate count
    const countEl = document.getElementById(`count-${index}`);
    countEl.classList.remove('pop');
    void countEl.offsetWidth;
    countEl.classList.add('pop');

    render();
  }

  function buildOptions() {
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    options.forEach((name, i) => {
      container.innerHTML += `
        <div class="option-row" id="row-${i}">
          <span class="option-name">${name}</span>
          <div class="counter">
            <button class="btn sub" id="sub-${i}" disabled onclick="changeVote(${i}, -1)">−</button>
            <span class="count" id="count-${i}" data-count="0">0</span>
            <button class="btn add" id="add-${i}" onclick="changeVote(${i}, 1)">+</button>
          </div>
        </div>
      `;
    });
  }

  function handleSubmit() {
    if (totalUsed() !== TOTAL_VOTES) return;

    // Build results
    const resultsList = document.getElementById('results-list');
    resultsList.innerHTML = '';
    options.forEach((name, i) => {
      if (votes[i] > 0) {
        resultsList.innerHTML += `
          <div class="result-item">
            <span class="result-name">${name}</span>
            <span class="result-votes">${votes[i]} vote${votes[i] !== 1 ? 's' : ''}</span>
          </div>
        `;
      }
    });

    document.getElementById('form-section').style.display = 'none';
    const success = document.getElementById('success-section');
    success.classList.add('visible');
  }

  function resetForm() {
    votes = new Array(options.length).fill(0);
    document.getElementById('success-section').classList.remove('visible');
    document.getElementById('form-section').style.display = '';
    render();
  }

  // Init
  buildOptions();
  render();
</script>
</body>
</html>
